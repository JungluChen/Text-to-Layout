# 40-qubit SYNTHETIC chip lattice for the collision-yield showcase.
#
# SYNTHETIC_EXAMPLE / ANALYTICAL_ONLY / NOT_FABRICATION_READY.
# Every number below is illustrative, not from any foundry or measured device.
#
# Topology: 5x8 nearest-neighbor grid; three-bin frequency plan (5.00 / 5.30 /
# 5.60 GHz, bin = (row + 2*col) mod 3) with a deterministic +/-10 MHz per-site
# offset. The 300 MHz bin spacing clears every forbidden window (qubit-qubit,
# two-photon |df-alpha|, charge-parity |2df-alpha| with alpha = -200 MHz) by
# >= 70 MHz, comfortably above the ~11 MHz pair sigma.
#
# THREE DELIBERATE PLACEMENT ERRORS (Q0_1, Q2_4, Q4_6 are assigned a
# neighbor's bin) create nominal collisions that `textlayout chip optimize`
# must find and retune -- that closed loop is what this example demonstrates.
#
# Each qubit has a dedicated readout resonator (6.45-6.65 GHz) and each edge
# a tunable-coupler mode (7.6-7.9 GHz).
#
# Process-variation assumptions (the freq_sigma_mhz on every node):
#   sigma_f ~= (f/2) * sqrt(sigma_Jc_local^2 + sigma_C^2)
#   with sigma_Jc_local = 0.28% (junction critical current) and shunt-
#   capacitance sigma_C = 0.14% at ~5.3 GHz -> ~8 MHz. Both sigmas are
#   ILLUSTRATIVE (see src/textlayout/knowledge/pdks/generic_2metal.yaml,
#   calibration_status: illustrative).
#
# Collision rules (forbidden detuning windows, standard transmon taxonomy):
#   qubit-qubit, qubit-readout, qubit-coupler, plus the two-photon
#   (|df - alpha|) and charge-parity/ZZ (|2df - alpha|) higher-order hooks --
#   evaluated by the same Monte Carlo; their thresholds are illustrative
#   placeholders awaiting calibrated values.
#
# Reproducibility: run with an explicit --seed (the showcase uses 1234).
