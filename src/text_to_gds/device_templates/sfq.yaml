device: SFQ
description: Single-flux-quantum digital cell (e.g. splitter, JTL).
must_have:
  - junction
  - bias_line
  - input_port
  - output_port
  - ground_plane
equations:
  flux_quantum: "Phi0 = h / (2*e) = 2.0678e-15 Wb"
  ic_rn_product: "I_c * R_n ~ pi*Delta/(2*e)"
validity:
  critical_current_ua: [10.0, 1000.0]
constraints:
  - flux_quantisation
