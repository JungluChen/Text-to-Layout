device: JPA
description: Josephson / lumped-element parametric amplifier (single resonant mode).
must_have:
  - signal_conductor
  - ground_planes
  - junction
  - input_port
  - output_port
  - pump_coupling
equations:
  resonance: "f0 = 1 / (2*pi*sqrt(L_j*C))"
  josephson_inductance: "L_j = Phi0 / (2*pi*I_c)"
  gain_bandwidth: "sqrt(G) * BW <= f0 / Q_loaded"
validity:
  frequency_ghz: [1.0, 20.0]
  gain_db: [0.0, 30.0]
  bandwidth_mhz: [1.0, 2000.0]
constraints:
  - bode_fano
  - manley_rowe
  - kerr_limit
  - quantum_noise
