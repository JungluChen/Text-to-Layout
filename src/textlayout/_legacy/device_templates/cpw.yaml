device: CPW
description: Coplanar waveguide transmission line / resonator section.
must_have:
  - signal_conductor
  - ground_planes
  - gap
  - input_port
  - output_port
  - impedance_check
equations:
  impedance: "Z0 = 30*pi/sqrt(eps_eff) * K(k')/K(k), k = w/(w+2g)"
  effective_permittivity: "eps_eff = (1 + eps_r) / 2"
  quarter_wave_length: "L = c / (4 * f0 * sqrt(eps_eff))"
validity:
  frequency_ghz: [0.1, 30.0]
  impedance_ohm: [20.0, 120.0]
constraints: []
