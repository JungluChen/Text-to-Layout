device: Transmon
description: Transmon qubit (shunted Josephson junction with large pad capacitance).
must_have:
  - junction
  - shunt_capacitor
  - ground_plane
  - readout_coupling
  - drive_port
equations:
  qubit_frequency: "f01 ~ (sqrt(8*E_J*E_C) - E_C) / h"
  anharmonicity: "alpha ~ -E_C / h"
  charging_energy: "E_C = e^2 / (2*C)"
validity:
  frequency_ghz: [3.0, 8.0]
  anharmonicity_ghz: [-0.5, -0.1]
constraints:
  - quantum_noise
