# NOT FOUNDRY-VALIDATED. This mirrors the built-in GENERIC_2METAL Technology
# (src/textlayout/knowledge/technology_library.py) as a PDK-schema example so
# the same numbers are reachable through the richer PDK loader. It exists for
# format compatibility and testing, not as a process recommendation.
schema_version: textlayout.pdk.v1
name: generic_2metal_pdk
version: "0.1.0"
foundry_validated: false
calibration_status: illustrative
source: "Mirrors the built-in generic_2metal Technology; illustrative only."
grid:
  grid_nm: 5.0
  default_min_spacing_um: 2.0
  default_min_width_um: 1.0
substrate:
  material: "high-resistivity silicon"
  epsilon_r: 11.9
  loss_tangent: 1.0e-6
layers:
  - name: M1
    purpose: metal
    gds_layer: 1
    gds_datatype: 0
    min_width_um: 2.0
    min_spacing_um: 2.0
    color: "#1f77b4"
  - name: M2
    purpose: metal
    gds_layer: 2
    gds_datatype: 0
    min_width_um: 2.0
    min_spacing_um: 2.0
    color: "#ff7f0e"
  - name: JJ
    purpose: junction
    gds_layer: 3
    gds_datatype: 0
    min_width_um: 0.1
    min_spacing_um: 0.2
    color: "#d62728"
  - name: GND
    purpose: ground
    gds_layer: 10
    gds_datatype: 0
    min_width_um: 2.0
    min_spacing_um: 2.0
    color: "#7f7f7f"
  - name: TEXT
    purpose: text
    gds_layer: 63
    gds_datatype: 0
    min_width_um: 1.0
    min_spacing_um: 1.0
    color: "#2ca02c"
notes:
  - "Illustrative process only. No fabrication claim of any kind."
  - "Kept numerically identical to the built-in generic_2metal Technology."
