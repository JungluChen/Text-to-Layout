name: palace-integration

# Solver-enabled CI. Deliberately separate from normal PR CI, which only
# tests the absent-solver path. Pinned to Palace 0.17.0 and the committed
# Spack environment (external_tools/palace/spack.yaml). Requires
# SMOKE_TEST_PASSED before the reduced CPW benchmark runs. Never commits
# binaries or ParaView field data; artifacts are compact JSON/CSV/logs only.

on:
  workflow_dispatch:
    inputs:
      run_benchmark:
        description: "Also run the reduced CPW quarter-wave benchmark"
        type: boolean
        default: true
  schedule:
    - cron: "17 3 * * 1" # weekly, Monday 03:17 UTC

concurrency:
  group: palace-integration
  cancel-in-progress: false

jobs:
  palace:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install toolchain prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gfortran git openmpi-bin libopenmpi-dev \
            libglu1-mesa libxrender1 libxcursor1 libxft2 libxinerama1

      - name: Sync Python environment (pinned Gmsh 4.15.2)
        run: uv sync --all-extras

      - name: Restore Spack and Palace caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/textlayout-palace
            .tools/palace
            .tools/external/sources
          key: palace-0.17.0-${{ hashFiles('external_tools/palace/spack.yaml', 'scripts/external/_palace_common.py') }}

      - name: Install pinned Palace 0.17.0 via Spack
        run: uv run python scripts/external/install_palace.py

      - name: Verify installation state
        run: uv run python scripts/external/check_palace.py

      - name: Run the official Palace smoke benchmark
        run: uv run python scripts/external/run_palace_smoke.py

      - name: Require SMOKE_TEST_PASSED
        run: |
          uv run python scripts/external/check_palace.py
          uv run python - <<'EOF'
          import json, pathlib, sys
          state = json.loads(pathlib.Path("out/toolchain/palace_check.json").read_text())["state"]
          print(f"palace check state: {state}")
          sys.exit(0 if state in {"SMOKE_TEST_PASSED", "BENCHMARK_EXECUTED"} else 1)
          EOF

      - name: Run the reduced CPW quarter-wave benchmark
        if: ${{ github.event_name == 'schedule' || inputs.run_benchmark }}
        run: |
          uv run textlayout simulate palace-resonator \
            --out out/palace_resonator_v017 \
            --processes 2 \
            --mesh-scale 4.0 \
            --amr-iterations 4

      - name: Collect compact artifacts (no binaries, no ParaView fields)
        if: always()
        run: |
          mkdir -p out/ci_artifacts
          find out/toolchain out/palace_resonator_v017 \
            \( -name '*.json' -o -name '*.csv' -o -name '*.md' -o -name '*.txt' \) \
            -size -2M -print0 2>/dev/null | \
            xargs -0 -I{} cp --parents {} out/ci_artifacts/ || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: palace-integration-evidence
          path: out/ci_artifacts
          retention-days: 30
