name: KLayout signoff evidence

on:
  pull_request:
  workflow_dispatch:

jobs:
  klayout-signoff:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081
        with:
          python-version: "3.12"

      - name: Sync Python environment
        run: uv sync --frozen --dev

      - name: Verify clean source tree before build
        run: git diff --exit-code

      - name: Build exact KLayout image
        run: |
          docker build \
            --build-arg SOURCE_REVISION="${GITHUB_SHA}" \
            -f docker/klayout.Dockerfile \
            -t textlayout/klayout:local .

      - name: Verify clean KLayout image revision and executable identity
        run: uv run python scripts/generate_klayout_image_evidence.py --source-revision "${GITHUB_SHA}"

      - name: Generate Docker interoperability SBOM
        run: |
          docker sbom textlayout/klayout:local --format spdx-json \
            > out/audit/klayout.sbom.spdx.json

      - name: Generate Syft release SBOM
        run: uv run python scripts/generate_syft_sbom.py --image textlayout/klayout:local

      - name: Validate release SPDX SBOM
        run: |
          KLAYOUT_IMAGE_ID="$(docker image inspect textlayout/klayout:local --format '{{.Id}}')"
          uv run python scripts/validate_spdx_sbom.py --expected-image-digest "${KLAYOUT_IMAGE_ID}"

      - name: Run pinned Trivy policy
        run: |
          mkdir -p out/audit
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${PWD}/out/audit:/out" \
            aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format json \
            --output /out/klayout.trivy.json \
            textlayout/klayout:local

      - name: Validate DRC and partial-LVS fixtures
        run: |
          uv run python scripts/validate_klayout_signoff_fixtures.py
          uv run pytest \
            tests/textlayout_suite/test_klayout_drc.py \
            tests/textlayout_suite/test_partial_lvs.py \
            -q

      - name: Regenerate capability matrix and claim audit
        run: uv run python scripts/generate_audit_artifacts.py --fail-on-claim-downgrade

      - name: Upload KLayout signoff evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: klayout-signoff-evidence
          path: |
            out/audit/klayout_image.json
            out/audit/klayout.sbom.spdx.json
            out/audit/klayout.syft.spdx.json
            out/audit/klayout_syft_sbom.json
            out/audit/klayout_sbom_validation.json
            out/audit/klayout.trivy.json
            out/audit/klayout_drc_fixtures.json
            out/audit/klayout_containerized_drc.json
            out/audit/klayout_lyrdb/**
            out/audit/klayout_partial_electrical_lvs.json
            out/audit/klayout_native_lvs/**
            out/audit/capability_matrix.json
            tests/fixtures/klayout_drc/*.lydrc
            tests/fixtures/klayout_drc/*.json
            tests/fixtures/klayout_lvs/*.json
          retention-days: 30
