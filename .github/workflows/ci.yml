name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: '${{ matrix.python }}' }
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv build

  bundle-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: '3.12' }
      - name: Regenerate bundled plugin copy
        run: uv run python scripts/bundle_plugin.py
      - name: Fail if plugins/text-to-gds is out of sync with source
        run: |
          if ! git diff --exit-code -- plugins/text-to-gds; then
            echo "::error::plugins/text-to-gds is stale. Run 'python scripts/bundle_plugin.py' and commit the result." >&2
            exit 1
          fi
