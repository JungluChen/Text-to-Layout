name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: '${{ matrix.python }}' }
      - run: uv sync --dev
      - run: uv run python scripts/validate_readme_claims.py
      - run: uv run ruff check .
      # pyproject declares `[tool.mypy] strict = true` over src/textlayout, but
      # until now no workflow ran it, so 3 type errors sat unnoticed on main.
      - run: uv run mypy
      - run: uv run pytest --junit-xml=out/evidence/test_report.xml
      - run: uv run python scripts/generate_project_status.py --check
      - run: uv build

  quality-gates:
    # Benchmark audit, CLI smoke, and determinism. Optional solvers (FasterCap,
    # FastHenry, openEMS) are absent here, so simulation stays in the
    # input-prepared / solver-missing states and nothing is over-claimed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: '3.12' }
      - run: uv sync --dev

      - name: Strict benchmark audit
        run: uv run python scripts/check_benchmarks.py --strict

      - name: README claim audit
        run: uv run python scripts/validate_readme_claims.py

      # One solver result must not have two statuses. These three gates are the
      # reason the resonator's SIMULATION_INVALID result can no longer coexist
      # with eight artifacts publishing a 3.0 GHz resonance.
      - name: Canonical evidence is re-derivable from committed solver outputs
        run: uv run python scripts/build_canonical_evidence.py --check

      - name: Derived showcase artifacts are not stale
        run: uv run python scripts/render_showcase_artifacts.py --check

      - name: Cross-artifact evidence consistency (every showcase)
        run: uv run python scripts/audit_evidence_consistency.py

      - name: Natural-language IDC closed-loop smoke
        run: >-
          uv run textlayout prompt
          "Create a 0.6 pF IDC on silicon at 6 GHz with 2 um min gap"
          --out ci_out/idc_prompt

      - name: Acceptance audit (physics-fit packets are current)
        run: |
          uv run python scripts/generate_acceptance.py
          git diff --exit-code examples/acceptance/ \
            || (echo "::error::examples/acceptance is stale. Run scripts/generate_acceptance.py and commit." && exit 1)

      - name: CLI - help
        run: uv run textlayout --help

      - name: CLI - verify a benchmark DSL
        run: uv run textlayout verify examples/benchmarks/01_idc_0p6pf/layout.json

      - name: CLI - generate a benchmark to a scratch dir
        run: uv run textlayout generate examples/benchmarks/01_idc_0p6pf/layout.json --out ci_out/idc

      - name: Benchmark determinism (default run is a no-op when DSL is unchanged)
        # The default generator skips benchmarks whose layout.json is unchanged,
        # so this must leave the tree clean regardless of the CI toolchain
        # version. Byte-exact `--force` reproducibility is toolchain-pinned and is
        # verified locally (see docs/artifact_policy.md), not gated here.
        run: |
          uv run python scripts/generate_benchmarks.py
          git diff --exit-code examples/benchmarks/ \
            || (echo "::error::benchmark artifacts are stale; run scripts/generate_benchmarks.py --force and commit." && exit 1)

      - name: API smoke test (/health and /openapi.json return JSON)
        run: |
          uv run python - <<'PY'
          from fastapi.testclient import TestClient
          from textlayout.backend import create_app
          client = TestClient(create_app())
          health = client.get("/health")
          assert health.status_code == 200, health.status_code
          assert health.headers["content-type"].split(";")[0] == "application/json"
          assert health.json()["status"] == "ok"
          schema = client.get("/openapi.json")
          assert schema.status_code == 200, schema.status_code
          assert schema.json()["openapi"].startswith("3.")
          print("API smoke test passed")
          PY

  bundle-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: '3.12' }
      - name: Regenerate bundled plugin copy
        run: uv run python scripts/bundle_plugin.py
      - name: Fail if plugins/text-to-gds is out of sync with source
        run: |
          if ! git diff --exit-code -- plugins/text-to-gds; then
            echo "::error::plugins/text-to-gds is stale. Run 'python scripts/bundle_plugin.py' and commit the result." >&2
            exit 1
          fi
