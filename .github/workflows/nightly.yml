name: Nightly benchmarks
on:
  schedule: [{cron: '0 3 * * *'}]
  workflow_dispatch:
jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run pytest tests/test_paper_benchmarks.py tests/test_em_solvers.py -q
      - uses: actions/upload-artifact@v4
        with: {name: benchmark-results, path: workspace/artifacts}
