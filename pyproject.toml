[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "text-to-gds"
version = "0.1.0"
description = "Local-first MCP tools for agentic GDS generation, DRC, and superconducting circuit layout."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Text-to-GDS contributors" }]
dependencies = [
  "gdsfactory>=8.0",
  "klayout>=0.29",
  "mcp[cli]>=1.2.0",
]

[project.urls]
Repository = "https://github.com/JungluChen/Text-to-Layout"
Issues = "https://github.com/JungluChen/Text-to-Layout/issues"

[project.scripts]
text-to-gds = "text_to_gds.server:main"

[dependency-groups]
dev = [
  "pytest>=8.0",
  "ruff>=0.6",
]

[tool.hatch.build.targets.wheel]
packages = ["src/text_to_gds"]

[tool.ruff]
line-length = 100
target-version = "py311"
