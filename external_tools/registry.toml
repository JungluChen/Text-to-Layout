source_archive_size_bytes = 42487808
spdx_license = "Apache-2.0"
copyright_holder = "Amazon.com, Inc. or its affiliates"
install_mode = "pinned source build or pinned container"
integration_mode = "external executable via subprocess and file exchange"
redistribute_source = false
redistribute_binaries = false
adapter_module = "textlayout.solvers.palace.backend"
smoke_test_command = ["palace", "--version"]
