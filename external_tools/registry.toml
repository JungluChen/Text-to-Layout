schema_version = "textlayout.external-tools.registry.v1"

[policy]
mit_core_license = "MIT"
source_cache = ".tools/external/sources"
notice_file = "THIRD_PARTY_NOTICES.md"
gpl_policy = "process-isolated file exchange only unless the combined distribution receives deliberate GPL review"
commercial_policy = "commercial binaries, license files, and proprietary libraries must never be committed"
dataset_policy = "dataset licenses are recorded separately from software licenses"

[[tools]]
id = "palace"
canonical_name = "Palace"
upstream_repository = "https://github.com/awslabs/palace"
pinned_ref = "v0.17.0"
pinned_commit = "12d8069afb5aa9e169a17e303d735e120968e9f2"
