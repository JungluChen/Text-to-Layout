    material: Nb
    thickness_nm: 200.0
    min_width_um: 0.6
    min_spacing_um: 0.6
    overlay_tolerance_um: 0.12
constraints:
  min_junction_width_um: 0.5
  min_junction_height_um: 0.5
  min_trace_width_um: 0.4
  min_trace_spacing_um: 0.4
  min_cpw_gap_um: 1.5
  via_min_size_um: 0.6
